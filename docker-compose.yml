services:
  nginx:
    image: nginx:latest
    ports:
      - "2017:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - be
      - fe
  be:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./be:/var/www
      - ./be/public:/var/www/html
    ports:
      - 92:80
    tty: true
  fe:
    build:
      context: .
      dockerfile: fe.Dockerfile
    volumes:
      - ./fe/full-version:/app
    ports:
      - 93:3000
    tty: true
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_tryout
    volumes:
      - ./docker-dev-volumes/postgres_data:/var/lib/postgresql/data